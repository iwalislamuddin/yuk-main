# Keep-alive: ping /health server Render supaya tidak tidur (free tier mati
# setelah ~15 mnt idle). Ini membuat hitungan online & lobi selalu "hidup".
#
# CATATAN: cron GitHub Actions sering TELAT (kadang 10-30 mnt) dan dimatikan
# otomatis setelah 60 hari repo tanpa aktivitas. Untuk keandalan lebih baik,
# pakai layanan eksternal gratis seperti cron-job.org atau UptimeRobot yang
# memanggil https://yuk-main-server.onrender.com/health tiap 10 menit.
name: Keep server awake

on:
  schedule:
    - cron: "*/10 * * * *"   # tiap ~10 menit
  workflow_dispatch:          # bisa dijalankan manual dari tab Actions

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping /health
        run: curl -fsS https://yuk-main-server.onrender.com/health || true
